<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body class="admin-body">

  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar__logo">
        <span class="nav__logo-bracket">{</span>SAP<span class="nav__logo-bracket">}</span>
        <span class="admin-sidebar__label">Admin</span>
      </div>
      <nav class="admin-sidebar__nav">
        <a href="{{ url_for('admin.dashboard') }}"   class="admin-nav__link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">📊 Dashboard</a>
        <a href="{{ url_for('admin.new_project') }}" class="admin-nav__link {% if request.endpoint == 'admin.new_project' %}active{% endif %}">➕ New Project</a>
        <a href="{{ url_for('admin.new_skill') }}"   class="admin-nav__link {% if request.endpoint == 'admin.new_skill' %}active{% endif %}">➕ New Skill</a>
        <hr class="admin-sidebar__divider" />
        <a href="{{ url_for('main.index') }}" class="admin-nav__link">🌐 View Site</a>
        <a href="{{ url_for('admin.logout') }}" class="admin-nav__link admin-nav__link--danger">🚪 Logout</a>
      </nav>
    </aside>

    <!-- Main content -->
    <div class="admin-main">
      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-container">
            {% for category, message in messages %}
              <div class="flash flash--{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <div class="admin-content">
        {% block content %}{% endblock %}
      </div>
    </div>

  </div>

</body>
</html>
