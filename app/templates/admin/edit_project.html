{% extends "admin/admin_base.html" %}
{% block title %}{{ 'Edit' if project else 'New' }} Project — Admin{% endblock %}

{% block content %}
<div class="admin-page-header">
  <h1>{{ 'Edit Project' if project else 'New Project' }}</h1>
  <a href="{{ url_for('admin.dashboard') }}" class="btn btn--outline btn--sm">← Back</a>
</div>

<div class="admin-form-card">
  <form method="POST">

    <div class="form-group">
      <label for="title">Title <span class="req">*</span></label>
      <input type="text" id="title" name="title" required
             value="{{ project.title if project else '' }}" />
    </div>

    <div class="form-group">
      <label for="description">Description <span class="req">*</span></label>
      <textarea id="description" name="description" rows="4" required>{{ project.description if project else '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="role">Your Role</label>
      <input type="text" id="role" name="role" placeholder="e.g. Backend Lead — Express.js API, auth integration"
             value="{{ project.role if project else '' }}" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="github_url">GitHub URL</label>
        <input type="url" id="github_url" name="github_url"
               value="{{ project.github_url if project else '' }}" />
      </div>
      <div class="form-group">
        <label for="live_url">Live URL</label>
        <input type="url" id="live_url" name="live_url"
               value="{{ project.live_url if project else '' }}" />
      </div>
    </div>

    <div class="form-group">
      <label for="tech_stack">Tech Stack <small>(comma-separated)</small></label>
      <input type="text" id="tech_stack" name="tech_stack"
             placeholder="Flask, Python, PostgreSQL, Docker"
             value="{{ project.tech_stack | join(', ') if project else '' }}" />
    </div>

    <div class="form-group">
      <label for="backend_metrics">Backend Metrics</label>
      <textarea id="backend_metrics" name="backend_metrics" rows="3"
                placeholder="Highlight latency, query optimisation, auth approach…">{{ project.backend_metrics if project else '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="mermaid_diagram">
        Architecture Diagram
        <small>(Mermaid syntax — <a href="https://mermaid.live" target="_blank" rel="noopener">preview here</a>)</small>
      </label>
      <textarea id="mermaid_diagram" name="mermaid_diagram" rows="8"
                style="font-family: var(--font-mono); font-size: 0.85rem;"
                placeholder="graph LR&#10;  A[Client] --> B[API]&#10;  B --> C[DB]">{{ project.mermaid_diagram if project else '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="api_endpoints">
        API Endpoints
        <small>(JSON array — e.g. <code>[{"method":"GET","path":"/api/x","desc":"..."}]</code>)</small>
      </label>
      <textarea id="api_endpoints" name="api_endpoints" rows="6"
                style="font-family: var(--font-mono); font-size: 0.85rem;">{{ project.api_endpoints | tojson(indent=2) if project else '[]' }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="order">Display Order</label>
        <input type="number" id="order" name="order" min="0"
               value="{{ project.order if project else 0 }}" />
      </div>
      <div class="form-group form-group--checkbox">
        <label class="checkbox-label">
          <input type="checkbox" name="is_featured"
                 {% if project and project.is_featured %}checked{% endif %} />
          Featured on homepage
        </label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">
        {{ 'Update Project' if project else 'Create Project' }}
      </button>
      <a href="{{ url_for('admin.dashboard') }}" class="btn btn--outline">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
